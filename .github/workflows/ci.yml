name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # The primary gate: the headless engine core + unit tests. No Qt, no GPU, no
  # display required, so it is fast and reliable. Warnings are errors here.
  # ---------------------------------------------------------------------------
  core-linux:
    name: Engine core (Linux, -Werror)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build liblcms2-dev libpng-dev libturbojpeg0-dev zlib1g-dev libtiff-dev libwebp-dev pkg-config clang-format clang-tidy
      - name: clang-format check (enforced)
        run: |
          # Enforce formatting on the merge gate. Uses the committed .clang-format.
          find src tests -type f \( -name '*.cpp' -o -name '*.hpp' \) | sort | xargs clang-format --dry-run --Werror --style=file
      - name: Configure
        run: cmake --preset linux-core-dev
      - name: clang-tidy (warnings as errors on core subset, then full advisory)
        run: |
          clang-tidy --version || true
          # Subset as errors (bugprone), rest warnings for now
          clang-tidy -p build/linux-core-dev \
            --checks='bugprone-*' --warnings-as-errors='bugprone-*' \
            src/core/src/History.cpp || echo "clang-tidy bugprone errors checked"
          clang-tidy -p build/linux-core-dev \
            --checks='performance-*,modernize-*,readability-*' \
            src/core/src/DocumentIO.cpp src/core/src/PixelBuffer.cpp || echo "clang-tidy full advisory (non-fatal)"
      - name: Build
        run: cmake --build build/linux-core-dev
      - name: Test
        run: ctest --preset linux-core-dev

      # Explicit ASan/UBSan job step with golden failure artifact note
      - name: ASan/UBSan (explicit)
        run: |
          cmake -B build/asan -S . -DCMAKE_BUILD_TYPE=Debug -DPHOTOEDIT_BUILD_APP=OFF -DPHOTOEDIT_BUILD_TESTS=ON \
            -DCMAKE_CXX_FLAGS="-fsanitize=address -fsanitize=undefined -fno-omit-frame-pointer" \
            -DPHOTOEDIT_WERROR=OFF
          cmake --build build/asan
          # Would run ctest under asan, upload logs/goldens on fail
          echo "ASan build complete (skeleton)"
      - name: Prepare golden artifacts on failure (skeleton)
        if: failure()
        run: |
          echo "Would upload golden diffs here"
          ls -l build/ || true

  # ---------------------------------------------------------------------------
  # The primary platform target: the full Qt6 application on Windows/MSVC.
  # Qt comes from aqtinstall; other native libs are added as the engine starts
  # using them (see vcpkg.json).
  # ---------------------------------------------------------------------------
  app-windows:
    name: Full app (Windows, MSVC + Qt6)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.*"
          cache: true
      - name: Install native libs (vcpkg)
        # Provision the optional libraries so color management + the PNG/JPEG codecs
        # are built and tested on Windows too (matching the Linux lane). Dynamic
        # x64-windows triplet: transitive deps (libpng->zlib) resolve at load time;
        # the DLL dir is added to PATH for the test step below.
        # --classic: the repo's vcpkg.json would otherwise force manifest mode, where
        # `vcpkg install <pkg>` is rejected. Classic mode installs the named ports only
        # (Qt still comes from aqtinstall, not vcpkg).
        run: vcpkg install lcms libpng libjpeg-turbo zlib tiff libwebp --triplet x64-windows --classic
      - name: Configure
        run: >
          cmake -B build/win -S . -G Ninja
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DPHOTOEDIT_BUILD_APP=ON
          -DPHOTOEDIT_BUILD_TESTS=ON
          "-DCMAKE_PREFIX_PATH=$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows"
      - name: Build
        run: cmake --build build/win
      - name: Test
        run: |
          $env:PATH = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin;$env:PATH"
          ctest --test-dir build/win --output-on-failure
