name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # The primary gate: the headless engine core + unit tests. No Qt, no GPU, no
  # display required, so it is fast and reliable. Warnings are errors here.
  # ---------------------------------------------------------------------------
  core-linux:
    name: Engine core (Linux, -Werror)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build liblcms2-dev libpng-dev libturbojpeg0-dev zlib1g-dev libtiff-dev libwebp-dev pkg-config clang-format
      - name: clang-format check (enforced)
        run: |
          # Enforce formatting on the merge gate. Uses the committed .clang-format.
          find src tests -type f \( -name '*.cpp' -o -name '*.hpp' \) | sort | xargs clang-format --dry-run --Werror --style=file
      - name: Configure
        run: cmake --preset linux-core-dev
      - name: Build
        run: cmake --build build/linux-core-dev
      - name: Test
        run: ctest --preset linux-core-dev

      # Address + UB sanitizers: build the headless engine + tests and RUN them.
      - name: ASan/UBSan
        run: |
          cmake -B build/asan -S . -G Ninja -DPHOTOEDIT_BUILD_APP=OFF -DPHOTOEDIT_BUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo -DPHOTOEDIT_WERROR=OFF \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          cmake --build build/asan
          ASAN_OPTIONS=abort_on_error=1 UBSAN_OPTIONS=halt_on_error=1 ctest --test-dir build/asan --output-on-failure

  # ---------------------------------------------------------------------------
  # The primary platform target: the full Qt6 application on Windows/MSVC.
  # Qt comes from aqtinstall; other native libs are added as the engine starts
  # using them (see vcpkg.json).
  # ---------------------------------------------------------------------------
  app-windows:
    name: Full app (Windows, MSVC + Qt6)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.*"
          cache: true
      - name: Install native libs (vcpkg)
        # Provision the optional libraries so color management + the PNG/JPEG codecs
        # are built and tested on Windows too (matching the Linux lane). Dynamic
        # x64-windows triplet: transitive deps (libpng->zlib) resolve at load time;
        # the DLL dir is added to PATH for the test step below.
        # --classic: the repo's vcpkg.json would otherwise force manifest mode, where
        # `vcpkg install <pkg>` is rejected. Classic mode installs the named ports only
        # (Qt still comes from aqtinstall, not vcpkg).
        run: vcpkg install lcms libpng libjpeg-turbo zlib tiff libwebp --triplet x64-windows --classic
      - name: Configure
        run: >
          cmake -B build/win -S . -G Ninja
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DPHOTOEDIT_BUILD_APP=ON
          -DPHOTOEDIT_BUILD_TESTS=ON
          "-DCMAKE_PREFIX_PATH=$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows"
      - name: Build
        run: cmake --build build/win
      - name: Test
        run: |
          $env:PATH = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin;$env:PATH"
          ctest --test-dir build/win --output-on-failure

  # ---------------------------------------------------------------------------
  # Dependency-free lane: build the engine + tests with NONE of the optional
  # libraries installed, so every codec / color / zlib path compiles out via its
  # PHOTOEDIT_HAVE_* guard. This is what a fresh machine (or a minimal container)
  # sees; it stops the headless core from silently growing a hard dependency.
  # Warnings are errors here too.
  # ---------------------------------------------------------------------------
  core-linux-nodeps:
    name: Engine core (Linux, no optional deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools only (no image/color/zlib libs)
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Configure
        run: cmake --preset linux-core-dev
      - name: Build
        run: cmake --build build/linux-core-dev
      - name: Test
        run: ctest --preset linux-core-dev

  # ---------------------------------------------------------------------------
  # clang-tidy (advisory): runs the committed .clang-tidy over the engine core and
  # surfaces findings in the log. Non-blocking by design (continue-on-error) — the
  # config carries no WarningsAsErrors and the codebase has not been triaged to zero
  # findings, so this informs rather than gates. Promote to a gate after triage.
  # ---------------------------------------------------------------------------
  tidy-linux:
    name: clang-tidy (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install tools + libs (so codec/color headers resolve)
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang-tidy pkg-config liblcms2-dev libpng-dev libturbojpeg0-dev zlib1g-dev libtiff-dev libwebp-dev
      - name: Configure (exports compile_commands.json)
        run: cmake --preset linux-core-dev
      - name: Run clang-tidy on the engine core
        run: clang-tidy -p build/linux-core-dev $(git ls-files 'src/core/src/*.cpp')
